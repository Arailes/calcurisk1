<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Triagem Clínica</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    button:hover { background-color: #004494; }
    #resultado { margin-top: 20px; padding: 15px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 18px; display: none; }
    .vermelho { background-color: #ff4d4d; color: white; }
    .laranja { background-color: #ff944d; color: white; }
    .amarelo { background-color: #ffd633; color: black; }
    .verde { background-color: #4dff4d; color: black; }
    .azul { background-color: #4d4dff; color: white; }
</style>
</head>
<body>

<div class="container">
    <h2>Sistema de Triagem</h2>
    
    <div class="form-group">
        <label>Idade (anos):</label>
        <input type="number" id="idade" min="0">
    </div>

    <div class="form-group">
        <label>Frequência Cardíaca (bpm):</label>
        <input type="number" id="fc" min="0">
    </div>

    <div class="form-group">
        <label>SpO2 (%):</label>
        <input type="number" id="spo2" min="0" max="100">
    </div>

    <div class="form-group">
        <label>Nível de Consciência:</label>
        <select id="consciencia">
            <option value="normal">Alerta / Normal</option>
            <option value="alterado">Confusão Aguda / Responde à Voz</option>
            <option value="inconsciente">Inconsciente / Responde só a Dor</option>
        </select>
    </div>

    <div class="form-group">
        <label>Sinal de Alerta / Fisiopatologia Secundária:</label>
        <select id="alerta">
            <option value="nenhum">Nenhum / Queixa crônica</option>
            <option value="dor_moderada">Dor moderada / Febre isolada</option>
            <option value="dor_severa">Dor torácica / Sangramento ativo / Intoxicação (Farmacologia)</option>
            <option value="choque">Parada Cardiorrespiratória / Obstrução de vias aéreas</option>
        </select>
    </div>

    <button onclick="calcularTriagem()">Classificar Paciente</button>

    <div id="resultado"></div>
</div>

<script>
    function calcularTriagem() {
        const idade = document.getElementById('idade').value;
        const fc = parseInt(document.getElementById('fc').value);
        const spo2 = parseInt(document.getElementById('spo2').value);
        const consciencia = document.getElementById('consciencia').value;
        const alerta = document.getElementById('alerta').value;
        const resultadoDiv = document.getElementById('resultado');

        // Validação básica de campos em branco
        if (!idade || isNaN(fc) || isNaN(spo2)) {
            alert("Erro: Preencha todos os dados vitais para análise clínica contínua.");
            return;
        }

        let prioridade = 5; // 1: Vermelho, 2: Laranja, 3: Amarelo, 4: Verde, 5: Azul

        // Propedêutica e Fisiopatologia: Nível Vermelho (Emergência - 0 min)
        if (consciencia === 'inconsciente' || alerta === 'choque') {
            prioridade = 1;
        } 
        // Nível Laranja (Muito Urgente - 10 min)
        else if (consciencia === 'alterado' || alerta === 'dor_severa' || spo2 < 90 || fc > 130 || fc < 40 || (idade < 1 && fc > 160)) {
            prioridade = 2;
        }
        // Nível Amarelo (Urgente - 60 min)
        else if (alerta === 'dor_moderada' || spo2 < 95 || fc > 110 || fc < 50) {
            prioridade = 3;
        }
        // Nível Verde (Pouco Urgente - 120 min)
        else if (alerta === 'nenhum' && fc >= 50 && fc <= 110 && spo2 >= 95) {
            prioridade = 4;
        }

        exibirResultado(prioridade);
    }

    function exibirResultado(nivel) {
        const div = document.getElementById('resultado');
        div.style.display = 'block';
        div.className = ''; // Reset classes

        switch(nivel) {
            case 1:
                div.innerHTML = 'EMERGÊNCIA (Vermelho) - Atendimento Imediato (0 min)';
                div.classList.add('vermelho');
                break;
            case 2:
                div.innerHTML = 'MUITO URGENTE (Laranja) - Tempo Alvo: 10 min';
                div.classList.add('laranja');
                break;
            case 3:
                div.innerHTML = 'URGENTE (Amarelo) - Tempo Alvo: 60 min';
                div.classList.add('amarelo');
                break;
            case 4:
                div.innerHTML = 'POUCO URGENTE (Verde) - Tempo Alvo: 120 min';
                div.classList.add('verde');
                break;
            default:
                div.innerHTML = 'NÃO URGENTE (Azul) - Tempo Alvo: 240 min';
                div.classList.add('azul');
        }
    }
</script>

</body>
</html>
